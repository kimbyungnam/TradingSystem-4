# pre-commit install 실행 시 같이 설치할 Git hook types
default_install_hook_types:
  - pre-commit
  - commit-msg

# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.2.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files
-   repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.20
    hooks:
    # 1. lint
    -   id: ruff-check
        name: ruff lint
        args: [--fix]

    # 2. isort
    -   id: ruff-check
        name: ruff isort
        args: [--select, I, --fix]

    # 3. formatting
    -   id: ruff-format
        name: ruff format

-   repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.4
    hooks:
      # 커밋 메시지가 Conventional Commit 형식인지 검사
    -   id: commitizen
        stages: [commit-msg]
